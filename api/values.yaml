replicaCount: 2

image:
  repository: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/api
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

containerPort: 8080

env:
  DB_HOST: database
  DB_PORT: "3306"
  DB_NAME: appdb
  DB_USER: appuser
  DB_PASSWORD: secret
